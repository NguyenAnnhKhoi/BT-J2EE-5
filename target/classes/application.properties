# ===== KẾT NỐI MYSQL =====
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/j2ee-5?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / HIBERNATE =====
# update  → tự tạo/cập nhật bảng theo Entity
# create  → xóa & tạo lại bảng mỗi lần chạy (chỉ dùng khi dev)
# validate → chỉ kiểm tra, không thay đổi DB
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== THYMELEAF =====
spring.thymeleaf.cache=false

# ===== PORT =====
server.port=8080
