<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <link rel="stylesheet" th:href="@{/css/worldclass.css}">
</head>
<body class="worldclass">
<div class="wc-login">
    <h2>Maison Product</h2>
    <p style="margin-top:0; color:#5e6773;">Đăng nhập vào không gian quản trị sản phẩm chuẩn quốc tế.</p>

    <div class="wc-alert error" th:if="${param.error}">Sai tên đăng nhập hoặc mật khẩu</div>
    <div class="wc-alert success" th:if="${param.logout}">Bạn đã đăng xuất</div>

    <form th:action="@{/login}" method="post">
        <div style="margin-bottom:12px;">
            <label for="username">Tài khoản</label>
            <input class="wc-input" type="text" id="username" name="username" required>
        </div>
        <div style="margin-bottom:14px;">
            <label for="password">Mật khẩu</label>
            <input class="wc-input" type="password" id="password" name="password" required>
        </div>
        <button class="wc-btn" type="submit" style="width:100%;">Đăng nhập</button>
    </form>

    <div style="margin-top:14px; color:#4a5461; font-size:13px;">Tài khoản mẫu</div>
    <div class="wc-grid-2" style="margin-top:8px;">
        <div class="wc-badge">ADMIN<br><b>nguyen.van.an / an123</b></div>
        <div class="wc-badge">USER<br><b>tran.thi.binh / binh123</b></div>
        <div class="wc-badge">USER<br><b>le.van.cuong / cuong123</b></div>
    </div>
</div>
<script th:src="@{/js/worldclass.js}"></script>
</body>
</html>
