<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Form danh mục</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        .form-group { margin-bottom: 14px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; }
        input[type=text] { width: 300px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
        .error { color: red; font-size: 13px; }
        button { padding: 8px 16px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        a { margin-left: 10px; color: #555; }
    </style>
</head>
<body>

<h1 th:text="${pageTitle}">Form danh mục</h1>

<form th:action="@{/categories/save}" th:object="${category}" method="post">
    <input type="hidden" th:field="*{id}"/>

    <div class="form-group">
        <label>Tên danh mục *</label>
        <input type="text" th:field="*{name}" placeholder="VD: Điện tử"/>
        <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
    </div>

    <button type="submit">Lưu</button>
    <a th:href="@{/categories}">← Quay lại</a>
</form>

</body>
</html>
