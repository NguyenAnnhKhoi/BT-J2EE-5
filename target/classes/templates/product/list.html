<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sản phẩm</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
        th { background: #4CAF50; color: white; }
        a.btn { padding: 6px 12px; background: #008CBA; color: white;
                text-decoration: none; border-radius: 4px; margin-right: 4px; }
        a.btn-danger { background: #e53935; }
        nav { margin-bottom: 20px; }
        .search-bar { margin-bottom: 14px; }
    </style>
</head>
<body>

<nav>
    <a class="btn" th:href="@{/categories}">Danh mục</a>
    <a class="btn" th:href="@{/products}">Sản phẩm</a>
</nav>

<h1>Danh sách sản phẩm</h1>

<div class="search-bar">
    <form th:action="@{/products}" method="get">
        <input type="text" name="search" th:value="${search}" placeholder="Tìm theo tên..."/>
        <button type="submit">Tìm</button>
        <a th:href="@{/products}">Xóa filter</a>
    </form>
</div>

<a class="btn" th:href="@{/products/add}">+ Thêm sản phẩm</a>
<br/><br/>

<table>
    <thead>
        <tr>
            <th>#</th>
            <th>Tên sản phẩm</th>
            <th>Giá</th>
            <th>Hình ảnh</th>
            <th>Danh mục</th>
            <th>Hành động</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="p : ${products}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.price}"></td>
            <td>
                <img th:src="${p.image}" alt="product image"
                     style="width: 80px; height: 80px; object-fit: cover; border-radius: 4px;"
                     onerror="this.src='https://via.placeholder.com/80'"/>
            </td>
            <td th:text="${p.category.name}"></td>
            <td>
                <a class="btn" th:href="@{/products/edit/{id}(id=${p.id})}">Sửa</a>
                <a class="btn btn-danger"
                   th:href="@{/products/delete/{id}(id=${p.id})}"
                   onclick="return confirm('Xóa sản phẩm này?')">Xóa</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(products)}">
            <td colspan="6" style="text-align:center">Chưa có sản phẩm nào</td>
        </tr>
    </tbody>
</table>

</body>
</html>
