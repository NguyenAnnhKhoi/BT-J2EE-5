<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <link rel="stylesheet" th:href="@{/css/worldclass.css}">
</head>
<body class="worldclass">
<div class="wc-shell">
    <section class="wc-hero">
        <h1 class="wc-title">Chi tiết sản phẩm</h1>
        <p class="wc-subtitle">Trang chi tiết được tinh chỉnh theo chuẩn thẩm mỹ cao cấp, tập trung vào thông tin quan trọng.</p>
    </section>

    <section class="wc-panel" th:if="${product != null}">
        <div style="display:grid; grid-template-columns: 160px 1fr; gap: 16px; align-items: start;">
            <img class="wc-thumb" style="width:150px; height:150px;" th:src="${product.image}" alt="product image" onerror="this.src='https://via.placeholder.com/150'"/>
            <div>
                <div style="margin-bottom:10px;"><b>Mã:</b> <span th:text="${product.id}"></span></div>
                <div style="margin-bottom:10px;"><b>Tên:</b> <span th:text="${product.name}"></span></div>
                <div style="margin-bottom:10px;"><b>Giá:</b> <span th:text="${product.price}"></span></div>
                <div style="margin-bottom:10px;"><b>Danh mục:</b> <span th:text="${product.category.name}"></span></div>
            </div>
        </div>
        <div style="margin-top:14px;">
            <a class="wc-btn ghost" th:href="@{/products}">← Quay lại danh sách</a>
        </div>
    </section>

    <section class="wc-panel" th:if="${product == null}">
        Không tìm thấy sản phẩm.
        <div style="margin-top:12px;"><a class="wc-btn ghost" th:href="@{/products}">← Quay lại danh sách</a></div>
    </div>
    </section>
</div>
<script th:src="@{/js/worldclass.js}"></script>
</body>
</html>
