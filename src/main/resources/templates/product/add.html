<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm sản phẩm</title>
    <link rel="stylesheet" th:href="@{/css/worldclass.css}">
</head>
<body class="worldclass">
<div class="wc-shell">
    <section class="wc-hero">
        <h1 class="wc-title">Thêm sản phẩm</h1>
        <p class="wc-subtitle">Tạo sản phẩm mới với biểu mẫu chuẩn thẩm mỹ cao cấp.</p>
    </section>

    <section class="wc-panel">
        <form th:action="@{/products/save}" th:object="${product}" method="post">
            <div style="margin-bottom:12px;">
                <label for="name">Tên sản phẩm</label>
                <input class="wc-input" style="width:100%;" type="text" th:field="*{name}" id="name" placeholder="Ví dụ: Đồng hồ Heritage">
            </div>
            <div style="margin-bottom:12px;">
                <label for="image">Link ảnh</label>
                <input class="wc-input" style="width:100%;" type="text" th:field="*{image}" id="image" placeholder="https://...">
            </div>
            <div style="margin-bottom:12px;">
                <label for="price">Giá</label>
                <input class="wc-input" style="width:100%;" type="number" th:field="*{price}" id="price" placeholder="Giá sản phẩm">
            </div>
            <div style="margin-bottom:12px;">
                <label for="categoryId">Danh mục</label>
                <select name="categoryId" class="wc-input" style="width:100%;" id="categoryId">
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                </select>
            </div>

            <div style="display:flex; gap:8px; flex-wrap:wrap;">
                <button type="submit" class="wc-btn">Lưu sản phẩm</button>
                <a th:href="@{/products}" class="wc-btn ghost">← Quay lại</a>
            </div>
        </form>
    </section>
</div>
<script th:src="@{/js/worldclass.js}"></script>
</body>
</html>
