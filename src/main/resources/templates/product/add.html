<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8"> <title>Add Product</title>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <h2>Add Product</h2>
    <form th:action="@{/products/save}" th:object="${product}" method="post" class="form">
        <div class="form-group">
            <label for="name">Name:</label>
            <input class="form-control" type="text" th:field="*{name}" id="name" placeholder="Product Name">
        </div>
        <div class="form-group">
            <label for="image">Image URL:</label>
            <input class="form-control" type="text" th:field="*{image}" id="image" placeholder="http://image.jpg">
        </div>
        <div class="form-group">
            <label for="price">Price:</label>
            <input class="form-control" type="number" th:field="*{price}" id="price" placeholder="Price">
        </div>
        <div class="form-group">
            <label for="category">Category:</label>
            <select name="categoryId" class="form-control" id="categoryId">
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Add Product</button>
    </form>
</div>
</body>
</html>
